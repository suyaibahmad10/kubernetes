apiVersion: v1
kind: Pod
metadata:
  name: traffic-generator
  labels:
    name: traffic-generator
spec:
  containers:
  - name: traffic-generator
    image: lmacademy/traffic-generator:1.0.0
    args:
      # Need to use FQDN to access the service in another namespace
      # <service-name>.<namespace>.svc.cluster.local
      - 'color-api-svc.dev.svc.cluster.local/api'
      - '1'