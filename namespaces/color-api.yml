apiVersion: v1
kind: Pod
metadata:
  name: color-api
  namespace: dev
  labels:
    name: color-api
spec:
  containers:
  - name: color-api
    image: lmacademy/color-api:1.1.0
    ports:
      - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: color-api-svc
  namespace: dev
  labels:
    name: color-api
spec:
  type: ClusterIP
  selector:
    name: color-api
  ports:
    - port: 80
      targetPort: 80
