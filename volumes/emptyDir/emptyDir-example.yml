apiVersion: v1
kind: Pod
metadata:
  name: empty-dir-demo
  labels:
    app: empty-dir-demo
spec:
  containers:
    - name: empty-dir-writer
      image: busybox:1.36.1
      # command: ["sh", "-c", "echo Hello Kubernetes! > /usr/share/temp/message.txt && sleep 3600"]
      command: 
        - "sh"
        - "-c"
        - "sleep 3600"
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
      volumeMounts:
        - name: temporary-storage
          mountPath: /usr/share/temp
    - name: empty-dir-reader
      image: busybox:1.36.1
      # command: ["sh", "-c", "echo Hello Kubernetes! > /usr/share/temp/message.txt && sleep 3600"]
      command: 
        - "sh"
        - "-c"
        - "sleep 3600"
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
      # mount the same emptyDir volume at a different path in the second container created below with volumes
      volumeMounts:
        - name: temporary-storage
          mountPath: /temp
          readOnly: true
  # create an emptyDir volume named temporary-storage
  volumes:
    - name: temporary-storage
      emptyDir: {}