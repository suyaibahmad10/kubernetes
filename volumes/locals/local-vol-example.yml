apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-volume
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    # This path should exist on the node where the pod is scheduled to run. 
    # In this example, we are using minikube, so we can create a directory on the minikube VM and use that path here.
    path: /mnt/disks/local1
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - minikube

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-volume-claim
spec:
  resources:
    requests:
      storage: 1Gi
      # storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage

---

apiVersion: v1
kind: Pod
metadata:
  name: local-volume-pod
  labels:
    app.kubernetes.io/name: local-volume-pod
spec:
  containers:
    - name: local-vol
      image: busybox:1.36.1
      # command: ["sh", "-c", "echo Hello Kubernetes! > /usr/share/temp/message.txt && sleep 3600"]
      command: 
        - "sh"
        - "-c"
        - "sleep 3600"
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
        requests:
          memory: "64Mi"
          cpu: "250m"
      volumeMounts:
        - name: local-volume
          mountPath: /mnt/local
  volumes:
    - name: local-volume
      persistentVolumeClaim:
        claimName: local-volume-claim

