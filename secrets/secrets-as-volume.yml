apiVersion: v1
kind: Pod
metadata:
  name: busybox-secret
  labels:
    name: busybox-secret
spec:
  containers:
    - name: busybox-secret
      image: busybox:1.36.1
      command: 
        - 'sh'
        - '-c'
        - 'sleep 3600'
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
        requests:
          memory: "64Mi"
          cpu: "250m"
      volumeMounts:
        - name: db-sercrets
          mountPath: "/etc/db"
          readOnly: true
  volumes:
    - name: db-sercrets
      secret:
        secretName: db-creds
        # below items is optional, if not provided, all keys in the secret will be mounted as files in the volume
        items:
          - key: username
            path: dev/password
