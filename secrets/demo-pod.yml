# Command used to create the secret manullay
# kc create secret generic db-creds --from-literal=username=db_user --from-literal=password=db_pass 

apiVersion: v1
kind: Pod
metadata:
  name: busybox
  labels:
    name: busybox
spec:
  containers:
  - name: busybox
    image: busybox:1.36.1
    command: 
      - 'sh'
      - '-c'
      # - 'echo "$DB_USER" && echo "$DB_PASSWORD" && sleep 3600'
      - 'echo "$username" && echo "$password" && sleep 3600'

    envFrom:
      - secretRef:
          name: db-creds
    # env: 
    #   - name: DB_USER
    #     valueFrom:
    #       secretKeyRef:
    #         name: db-creds
    #         key: username
    #   - name: DB_PASSWORD
    #     valueFrom:
    #       secretKeyRef:
    #         name: db-creds
    #         key: password
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "64Mi"
        cpu: "250m"
